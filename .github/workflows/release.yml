name: Release

# Triggered by:
# 1. Manual workflow_dispatch for testing builds
# 2. Push of git tags matching v*.* pattern
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.13'

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g., v1.0.0). Leave blank to build test artifacts only.'
        required: false
        type: string
      release_notes:
        description: 'Manual release notes (optional, overrides auto-generated notes)'
        required: false
        type: string
      auto_generate_notes:
        description: 'Auto-generate release notes from commits?'
        required: false
        type: boolean
        default: true
      create_release:
        description: 'Create GitHub release? (set false for testing)'
        required: false
        type: boolean
        default: true

  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Semantic versioning tags only

jobs:
  # Step 1: Validate and extract version
  validate:
    name: Validate & Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      version_tag: ${{ steps.extract.outputs.version_tag }}
      tag_match: ${{ steps.extract.outputs.tag_match }}
      is_release: ${{ steps.determine.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit counting

      - name: Extract version from pyproject.toml
        id: extract
        run: |
          VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_tag=v${VERSION}" >> $GITHUB_OUTPUT
          
          # Validate semantic versioning
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ ERROR: Invalid version format: $VERSION"
            echo "Expected format: X.Y.Z (semantic versioning)"
            exit 1
          fi
          
          # Check if tag matches version in pyproject.toml
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == "v$VERSION" || "$TAG" == "$VERSION" ]]; then
            echo "tag_match=true" >> $GITHUB_OUTPUT
            echo "✅ Version tag matches: $TAG == v$VERSION"
          else
            echo "tag_match=false" >> $GITHUB_OUTPUT
            echo "⚠️  Version tag mismatch: Tag=$TAG vs pyproject.toml=$VERSION"
          fi

      - name: Determine if this is a release
        id: determine
        run: |
          # Release if:
          # 1. Pushed tag matches semantic versioning, OR
          # 2. Workflow_dispatch with version_tag input
          if [[ "${{ github.ref_type }}" == "tag" ]] || [[ "${{ github.event.inputs.version_tag }}" != "" ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "🚀 This is a RELEASE build"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "🔨 This is a TEST/CI build"
          fi

      - name: Display validation info
        run: |
          cat << 'EOF'
          ═══════════════════════════════════════════════════════════
          📋 VERSION VALIDATION
          ═══════════════════════════════════════════════════════════
          Version: ${{ steps.extract.outputs.version }}
          Tag: ${{ steps.extract.outputs.version_tag }}
          Tag Match: ${{ steps.extract.outputs.tag_match }}
          Is Release: ${{ steps.determine.outputs.is_release }}
          Trigger: ${{ github.event_name }}
          ═══════════════════════════════════════════════════════════
          EOF

  # Step 2: Build Windows
  build-windows:
    name: 🪟 Build Windows
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Build Windows EXE
        run: |
          Write-Host "🔨 Building Windows: v${{ needs.validate.outputs.version }}"
          uv run python build.py
          Get-ChildItem dist\*.exe | ForEach-Object { Write-Host "✅ Built: $($_.Name) ($([math]::Round($_.Length/1MB, 2))MB)" }

      - name: Verify executable exists
        run: |
          $exe = Get-ChildItem dist\bangla-typer-*.exe | Select-Object -First 1
          if ($null -eq $exe) {
            Write-Host "❌ ERROR: No .exe file found in dist/"
            exit 1
          }
          Write-Host "✅ Executable verified: $($exe.Name)"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/bangla-typer-*.exe
          retention-days: 90
          if-no-files-found: error

  # Step 3: Build Linux (all formats)
  build-linux:
    name: 🐧 Build Linux
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            dpkg \
            rpm \
            wget \
            rsvg-convert \
            libfuse2 \
            fuse
          echo "✅ Build dependencies installed"

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Build all Linux packages
        run: |
          echo "🔨 Building Linux: v${{ needs.validate.outputs.version }}"
          uv run python build.py
          echo ""
          echo "📦 Build artifacts:"
          ls -lh dist/*.tar.gz dist/*.AppImage dist/*.rpm *.deb 2>/dev/null || true

      - name: Verify build outputs
        run: |
          # Check .deb
          if [ ! -f "bangla-typer.deb" ]; then
            echo "❌ ERROR: .deb file not found"
            exit 1
          fi
          echo "✅ Debian package: $(ls -lh bangla-typer.deb | awk '{print $9, $5}')"
          
          # Check tar.gz
          if [ ! -f "dist/bangla-typer-"*".tar.gz" ]; then
            echo "❌ ERROR: .tar.gz file not found"
            exit 1
          fi
          echo "✅ Portable archive: $(ls -lh dist/bangla-typer-*.tar.gz | awk '{print $9, $5}')"
          
          # Check AppImage (optional)
          if [ -f "dist/bangla-typer-"*".AppImage" ]; then
            echo "✅ AppImage: $(ls -lh dist/bangla-typer-*.AppImage | awk '{print $9, $5}')"
          else
            echo "⚠️  AppImage not created (appimagetool unavailable)"
          fi
          
          # Check RPM (optional)
          if [ -f "dist/bangla-typer-"*".rpm" ]; then
            echo "✅ RPM package: $(ls -lh dist/bangla-typer-*.rpm | awk '{print $9, $5}')"
          else
            echo "⚠️  RPM not created (rpmbuild unavailable)"
          fi

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: bangla-typer.deb
          retention-days: 90
          if-no-files-found: error

      - name: Upload tar.gz archive
        uses: actions/upload-artifact@v4
        with:
          name: linux-portable
          path: dist/bangla-typer-*.tar.gz
          retention-days: 90
          if-no-files-found: error

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: dist/bangla-typer-*.rpm
          retention-days: 90
          if-no-files-found: warn

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/bangla-typer-*.AppImage
          retention-days: 90
          if-no-files-found: warn

  # Step 4: Create GitHub Release
  release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: [validate, build-windows, build-linux]
    permissions:
      contents: write
    if: |
      needs.validate.outputs.is_release == 'true' &&
      (github.event.inputs.create_release == 'true' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets/

      - name: Organize release assets
        run: |
          echo "📦 Organizing release assets..."
          mkdir -p final_assets/
          
          # Windows
          cp release_assets/windows-exe/bangla-typer-*.exe final_assets/ 2>/dev/null || true
          
          # Linux - Debian
          cp release_assets/linux-deb/*.deb final_assets/ 2>/dev/null || true
          
          # Linux - Portable
          cp release_assets/linux-portable/*.tar.gz final_assets/ 2>/dev/null || true
          
          # Linux - RPM (optional)
          cp release_assets/linux-rpm/*.rpm final_assets/ 2>/dev/null || true
          
          # Linux - AppImage (optional)
          cp release_assets/linux-appimage/*.AppImage final_assets/ 2>/dev/null || true
          
          echo "✅ Assets organized:"
          ls -lh final_assets/

      - name: Generate release notes
        id: notes
        run: |
          if [[ "${{ github.event.inputs.release_notes }}" != "" ]]; then
            echo "Using manual release notes"
            echo 'RELEASE_NOTES<<EOF' >> $GITHUB_ENV
            echo "${{ github.event.inputs.release_notes }}" >> $GITHUB_ENV
            echo 'EOF' >> $GITHUB_ENV
          else
            # Generate from commits since last tag
            echo "Generating release notes from commits..."
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            
            if [ -z "$PREV_TAG" ]; then
              COMMIT_RANGE="HEAD"
            else
              COMMIT_RANGE="$PREV_TAG..HEAD"
            fi
            
            echo 'RELEASE_NOTES<<EOF' >> $GITHUB_ENV
            cat << 'NOTES' >> $GITHUB_ENV
          ## 🎉 What's New
          
          ### 📦 Downloads
          - **Windows**: `bangla-typer-${{ needs.validate.outputs.version }}.exe` - Standalone executable
          - **Linux (Debian/Ubuntu)**: `bangla-typer.deb` - Install with `sudo apt install ./bangla-typer.deb`
          - **Linux (Fedora/RHEL)**: `bangla-typer-*.rpm` - Install with `sudo dnf install ./bangla-typer-*.rpm`
          - **Linux (Universal)**: `bangla-typer-*.AppImage` - Run directly, no installation needed
          - **Linux (Portable)**: `bangla-typer-${{ needs.validate.outputs.version }}.tar.gz` - Extract and run
          
          ### ✨ Features & Improvements
          See [CHANGES.md](./CHANGES.md) for detailed changelog.
          
          ### 🔧 Installation & Usage
          - **Windows**: Run the .exe file directly
          - **Linux**: Choose your preferred package format and install
          - **First Run**: App will auto-detect and create config.json
          - **Configuration**: Configure data directory in GUI or edit `~/.bangla-typer/config.json`
          
          ### 📖 Documentation
          - [README.md](./README.md) - Quick start guide
          - [BUILD_GUIDE.md](./BUILD_GUIDE.md) - Build and distribution guide
          - [WORKFLOW.md](./WORKFLOW.md) - GitHub Actions workflow documentation
          
          ### 🐛 Report Issues
          Found a bug? [Open an issue](https://github.com/mehad605/Bangla_Typer/issues)
          
          ---
          **Release v${{ needs.validate.outputs.version }}** | Built on $(date +'%Y-%m-%d %H:%M UTC')
          NOTES
            echo 'EOF' >> $GITHUB_ENV
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.version_tag }}
          name: Bangla Typer ${{ needs.validate.outputs.version }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            final_assets/bangla-typer-*.exe
            final_assets/bangla-typer.deb
            final_assets/bangla-typer-*.tar.gz
            final_assets/bangla-typer-*.rpm
            final_assets/bangla-typer-*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Release summary
        run: |
          cat << 'EOF'
          ═══════════════════════════════════════════════════════════
          🎉 RELEASE CREATED SUCCESSFULLY
          ═══════════════════════════════════════════════════════════
          
          Version: ${{ needs.validate.outputs.version }}
          Tag: ${{ needs.validate.outputs.version_tag }}
          
          📦 Assets uploaded:
            ✅ Windows EXE
            ✅ Debian package
            ✅ Portable tar.gz
            ✅ RPM package
            ✅ AppImage
          
          🔗 Release URL:
          https://github.com/${{ github.repository }}/releases/tag/${{ needs.validate.outputs.version_tag }}
          
          ═══════════════════════════════════════════════════════════
          EOF

  # Step 5: Final summary
  summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    needs: [validate, build-windows, build-linux, release]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.build-windows.result }}" != "success" || "${{ needs.build-linux.result }}" != "success" ]]; then
            echo "❌ Build FAILED"
            exit 1
          fi
          echo "✅ All builds PASSED"

      - name: Display summary
        run: |
          cat << 'EOF'
          ═══════════════════════════════════════════════════════════
          ✅ WORKFLOW COMPLETED SUCCESSFULLY
          ═══════════════════════════════════════════════════════════
          
          📦 Version: ${{ needs.validate.outputs.version }}
          🏷️  Tag: ${{ needs.validate.outputs.version_tag }}
          
          ✅ Windows Build: ${{ needs.build-windows.result }}
          ✅ Linux Build: ${{ needs.build-linux.result }}
          ✅ Release Created: ${{ needs.release.result }}
          
          📊 Artifacts Available:
            • Windows EXE
            • Debian Package
            • Portable Archive (tar.gz)
            • RPM Package
            • AppImage Bundle
          
          🔗 Access Release:
          https://github.com/${{ github.repository }}/releases/tag/${{ needs.validate.outputs.version_tag }}
          
          ═══════════════════════════════════════════════════════════
          EOF

name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (leave blank to use pyproject.toml version)'
        required: false
        type: string
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  PYTHON_VERSION: '3.13'

jobs:
  validate:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_release: ${{ steps.check.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if release
        id: check
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-bin \
            dpkg-dev \
            rpm

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Python (uv)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Tauri CLI
        run: npm install @tauri-apps/cli

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build
        run: uv run python build.py

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb
          if-no-files-found: warn

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: warn

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: dist/*.rpm
          if-no-files-found: warn

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: dist/*.tar.gz
          if-no-files-found: warn

  build-windows:
    name: Windows
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Python (uv)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Tauri CLI
        run: npm install @tauri-apps/cli

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build
        run: uv run python build.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*
          if-no-files-found: warn

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [validate, build-linux, build-windows]
    if: needs.validate.outputs.is_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          cp artifacts/linux-deb/* release/ 2>/dev/null || true
          cp artifacts/linux-appimage/* release/ 2>/dev/null || true
          cp artifacts/linux-rpm/* release/ 2>/dev/null || true
          cp artifacts/linux-tar/* release/ 2>/dev/null || true
          cp artifacts/windows/* release/ 2>/dev/null || true
          echo "Release assets:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Bangla Typer ${{ needs.validate.outputs.version }}
          files: release/*
